<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Note</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    // Mirror ReadXiv's note convention (client/src/utils/mathjax.js):
    //   $$…$$ and $…$ = inline · $$$$…$$$$ and \[…\] = display.
    // `$$` listed before `$` so the longer delimiter pair resolves first.
    window.MathJax = {
      tex: {
        inlineMath: [['$$', '$$'], ['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$$$', '$$$$'], ['\\[', '\\]']]
      },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>
<body>
  <main class="wrap">
    <a class="back" href="index.html">← All notes</a>
    <div id="root"><div class="state">Loading…</div></div>
  </main>

  <script>
    // --- tiny YAML frontmatter parser (subset: scalars + inline arrays) ---
    function parseFrontmatter(text) {
      const m = /^---\r?\n([\s\S]*?)\r?\n---\r?\n?/.exec(text);
      if (!m) return { data: {}, body: text };
      const data = {};
      for (const line of m[1].split(/\r?\n/)) {
        const kv = /^([A-Za-z0-9_-]+)\s*:\s*(.*)$/.exec(line);
        if (!kv) continue;
        let [, key, val] = kv;
        val = val.trim();
        if (/^\[.*\]$/.test(val)) {
          val = val.slice(1, -1).split(',').map((s) => s.trim().replace(/^["']|["']$/g, '')).filter(Boolean);
        } else {
          val = val.replace(/^["']|["']$/g, '');
        }
        data[key] = val;
      }
      return { data, body: text.slice(m[0].length) };
    }

    // Decode HTML entities (the editor stores trailing spaces as &#x20;, etc.).
    function decodeEntities(s) {
      const t = document.createElement('textarea');
      t.innerHTML = s;
      return t.value;
    }

    // The notes editor escapes markdown punctuation when saving, so stored math
    // arrives as `\left\[`, `\lambda\_{dec}`, `\=`, `\+`. MathJax needs the real
    // chars. Unescape the punctuation the editor adds (\_ \[ \] \( \) \= \+ \-)
    // but NOT \<letter> commands (\frac) or LaTeX spacing (\!, \,, \;) — those
    // are intentional. Then make the result HTML-safe; MathJax reads it back.
    function normalizeMath(span) {
      const pairs = [['$$$$', '$$$$'], ['$$', '$$'], ['\\[', '\\]'], ['\\(', '\\)'], ['$', '$']];
      let open = '', close = '', inner = span;
      for (const [o, c] of pairs) {
        if (span.length >= o.length + c.length && span.startsWith(o) && span.endsWith(c)) {
          open = o; close = c; inner = span.slice(o.length, span.length - c.length); break;
        }
      }
      inner = decodeEntities(inner).replace(/\\([_[\]()=+\-])/g, '$1');
      inner = inner.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return open + inner + close;
    }

    // --- protect math from markdown, restore (normalized) afterwards ---
    function protectMath(src) {
      const store = [];
      const stash = (s) => { store.push(normalizeMath(s)); return '@@MATH_' + (store.length - 1) + '@@'; };
      // Dollar-delimited math first (longest run first) so each span is grabbed
      // whole — otherwise \[ / \( inside a $…$ span (e.g. escaped markdown like
      // `$D\=\[…]$`) would fragment it and expose underscores to markdown-it.
      let out = src;
      out = out.replace(/\$\$\$\$[\s\S]*?\$\$\$\$/g, stash); // display $$$$...$$$$
      out = out.replace(/\$\$[\s\S]*?\$\$/g, stash);         // inline  $$...$$
      out = out.replace(/(?<!\$)\$(?!\$)[^\n$]+?\$(?!\$)/g, stash); // inline $...$
      out = out.replace(/\\\[[\s\S]*?\\\]/g, stash);         // display \[...\]
      out = out.replace(/\\\([\s\S]*?\\\)/g, stash);         // inline  \(...\)
      return { out, store };
    }
    function restoreMath(html, store) {
      // Loop in case a span captured a placeholder from an earlier pass (nesting).
      let prev;
      do {
        prev = html;
        html = html.replace(/@@MATH_(\d+)@@/g, (_, i) => store[Number(i)]);
      } while (html !== prev && /@@MATH_\d+@@/.test(html));
      return html;
    }

    function getId() {
      return new URLSearchParams(location.search).get('id');
    }

    function esc(s) {
      return String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }

    async function render() {
      const root = document.getElementById('root');
      const id = getId();
      if (!id) { root.innerHTML = '<div class="state">No note id given.</div>'; return; }

      let raw;
      try {
        const res = await fetch('notes/' + encodeURIComponent(id) + '.md?_=' + Date.now());
        if (!res.ok) throw new Error('not found');
        raw = await res.text();
      } catch (e) {
        root.innerHTML = '<div class="state">Could not load this note.</div>';
        return;
      }

      const { data, body } = parseFrontmatter(raw);
      const md = window.markdownit({ html: false, linkify: true, typographer: true });
      const { out, store } = protectMath(body);
      let html = md.render(out);
      html = restoreMath(html, store);

      const title = data.title || id;
      document.title = title;

      let byline = '';
      const bits = [];
      if (data.authors) bits.push(esc(data.authors));
      if (data.arxiv) bits.push('<a href="https://arxiv.org/abs/' + esc(data.arxiv) + '" target="_blank" rel="noopener">arXiv:' + esc(data.arxiv) + '</a>');
      if (bits.length) byline = '<p class="byline">' + bits.join(' · ') + '</p>';

      root.innerHTML =
        '<header class="note-head"><h1>' + esc(title) + '</h1>' + byline + '</header>' +
        '<article class="content">' + html + '</article>';

      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([root]).catch(() => {});
      }
    }

    render();
  </script>
</body>
</html>
